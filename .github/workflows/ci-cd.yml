name: CI

on:
  pull_request:
    branches: [main, release-1.0.2]
  push:
    branches: [main, release-1.0.2]

jobs:
  client:
    name: Client - install, lint, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --run

      - name: Build
        run: npm run build

  server:
    name: Server - install, lint, typecheck, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: python -m flake8 app/

      - name: Typecheck
        run: python -m mypy app/

      - name: Test
        env:
          DATABASE_TEST: ${{ secrets.DATABASE_TEST }}
        run: python -m pytest tests/

  deploy-server:
    name: Deploy server to Render
    needs: [client, server]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

  deploy-client:
    name: Deploy client to Netlify
    needs: [client, server]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Netlify deploy
        run: curl -X POST "${{ secrets.NETLIFY_DEPLOY_HOOK_URL }}"
